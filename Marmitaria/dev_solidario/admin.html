<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Sabor de Casa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <header>
        <div class="logo"><i class="fa-solid fa-lock"></i> Painel Gerencial</div>
        <nav>
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Voltar ao Site</a>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-card">
            <h2>Cadastrar Novo Item</h2>
           <form id="form-add-item" class="admin-form">
                <!-- Campo escondido para saber se estamos editando -->
                <input type="hidden" id="edit-id" value="">

                <div class="form-row">
                    <div class="form-group">
                        <label for="tipo">Categoria</label>
                        <select id="tipo" required>
                            <option value="prato">Prato</option>
                            <option value="bebida">Bebida</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="preco">Preço (R$)</label>
                        <input type="number" id="preco" step="0.01" placeholder="Ex: 25.00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" placeholder="Ex: Strogonoff de Carne" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição dos ingredientes</label>
                    <textarea id="descricao" rows="2" placeholder="Ex: Acompanha arroz branco e batata palha..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="imagem">Imagem do Produto (Deixe vazio para manter a atual)</label>
                    <!-- ATENÇÃO: Tirei o "required" daqui -->
                    <input type="file" id="imagem" accept="image/*">
                </div>
                
                <button type="submit" id="btn-submit" class="btn-primary w-100"><i class="fa-solid fa-plus"></i> Salvar no Cardápio</button>
                <button type="button" id="btn-cancel" class="btn-danger w-100 mt-10" style="display: none;" onclick="cancelarEdicao()">Cancelar Edição</button>
            </form>
        </div>
        
        <div class="admin-card mt-20">
            <h2>Itens Cadastrados</h2>
            <div id="admin-list" class="admin-list">
                </div>
            <button onclick="limparCardapio()" class="btn-danger mt-20">Resetar Cardápio Padrão</button>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
